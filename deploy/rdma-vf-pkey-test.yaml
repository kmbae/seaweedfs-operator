apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-ib-network-pkey
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/resourceName: nvidia.com/mlnxnics
spec:
  config: |-
    {
      "cniVersion": "1.0.0",
      "name": "sriov-ib-network-pkey",
      "type": "ib-sriov",
      "capabilities": {
        "infinibandGUID": true
      },
      "pkey": "0x7fff",
      "link_state": "enable",
      "ipam": {
        "type": "nv-ipam",
        "poolName": "sriov-ib-pool"
      }
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: rdma-vf-pkey-hnode3
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/networks: |
      [
        {
          "name": "sriov-ib-network-pkey",
          "namespace": "default",
          "interface": "net1",
          "cni-args": {
            "guid": "02:00:00:00:00:00:20:03",
            "pkey": "0x7fff",
            "mellanox.infiniband.app": "configured"
          }
        }
      ]
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: hnode3
  containers:
    - name: rdma-probe
      image: kmbae27/rdma-engine:rdma-20260624-3cedc8c
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - sleep 3600
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
          nvidia.com/mlnxnics: "1"
        limits:
          memory: 256Mi
          nvidia.com/mlnxnics: "1"
