# -- Global Docker image parameters
# Please, note that this will override the image parameters, including dependencies, configured to use the global value
# Current available global Docker image parameters: imageRegistry
global:
  imageRegistry: "chrislusf"

# -- Deploy a Seaweed custom resource (cluster) alongside the operator.
# When enabled, `helm install` creates master/volume/filer and optional RDMA sidecars on volume pods.
seaweed:
  create: true
  # -- Seaweed CR name (defaults to Helm release name)
  name: ""
  image: chrislusf/seaweedfs:latest
  volumeServerDiskCount: 1
  hostSuffix: ""
  labels: {}
  annotations: {}
  master:
    replicas: 1
    volumeSizeLimitMB: 1024
  volume:
    replicas: 2
    storageClassName: seaweedfs-local
    # PVC request = smallest NAS capacity (pv-*.yaml capacity is per-node actual size)
    # Two racks (gnode1/rack1, gnode2/rack2) + replication 010: config/samples/seaweed_v1_seaweed_two_racks_gnode.yaml
    requests:
      storage: 200Gi
    rack: rack1
    dataCenter: dc1
    # user-defined pod annotations (merged with RDMA Multus annotation when rdma.enabled)
    annotations: {}
    sidecars: []
  filer:
    replicas: 1
    config: |
      [leveldb2]
      enabled = true
      dir = "/data/filerldb2"
    s3:
      enabled: false
      configSecret: {}
  # Mellanox SR-IOV / UCX RDMA sidecars on volume servers (see config/samples/seaweed_v1_seaweed_with_rdma_mellanox.yaml)
  rdma:
    enabled: true
    registry: registry-aisi.duckdns.org/seaweedfs
    sidecarTag: latest
    engineTag: ucx
    imagePullPolicy: Always
    multusNetwork: sriov-ib-network
    mlnxnicResource: nvidia.com/mlnxnics
    hugepages2Mi: 1Gi
    listenPort: 18515
    volumeServerURL: http://127.0.0.1:8444

# -- String to partially override common.names.fullname template (will maintain the release name)
nameOverride: ""

# -- String to fully override common.names.fullname template
fullnameOverride: ""

# -- Annotations for all the deployed objects
commonAnnotations: {}

# -- Labels for all the deployed objects
commonLabels: {}

## Custom Resource Definitions managed by this chart
crds:
  # -- Install the Seaweed CRD as part of the release. Set to false when the
  # CRD is managed out-of-band (e.g., cluster-scoped GitOps or a shared CRD
  # across namespaces) so `helm install/upgrade` won't try to create or adopt it.
  create: true

## Configure Kubernetes Rbac parameters
rbac:
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    # If set to "default", no ServiceAccount will be created and the default one will be used
    name: ""
    # -- Automount service account token for the server service account
    automount: true

image:
  registry: chrislusf
  repository: seaweedfs-operator
  # -- tag of image to use. Defaults to appVersion in Chart.yaml
  tag: ""
  # -- Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: http://kubernetes.io/docs/user-guide/images/#pre-pulling-images
  pullPolicy: IfNotPresent

  ## Specify credentials to authorize in docker registry or set existing secrets in pullSecrets
  # credentials:
  #  registry: private-registry
  #  username: username
  #  password: password

  ## Optionally specify imagePullSecret.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ##
  # pullSecrets: myRegistryKeySecretName

# -- Set number of pod replicas
replicaCount: 1

# -- Bucket usage stats refresh configuration. The operator periodically
# calls collection.list per Seaweed cluster and patches status.usage on
# each Bucket. Leave refreshInterval empty to use the in-binary default
# (5m). Set to "0s" to disable the loop entirely.
bucketUsage:
  refreshInterval: ""

## Configure container port
port:
  # -- name of the container port to use for the Kubernete service and ingress
  name: http
  # -- container port number to use for the Kubernete service and ingress
  number: 8080

## Configure Service
service:
  # -- name of the port to use for Kubernetes service
  portName: http
  # -- port to use for Kubernetes service
  port: 8080

grafanaDashboard:
  # -- Enable or disable Grafana Dashboard configmap
  enabled: true

serviceMonitor:
  # -- Enable or disable ServiceMonitor for prometheus metrics
  enabled: true
  # -- Specify the interval at which metrics should be scraped
  interval: 10s
  # -- Specify the timeout after which the scrape is ended
  scrapeTimeout: 10s
  ## Specify Metric Relabellings to add to the scrape endpoint
  # -- Specify honorLabels parameter to add the scrape endpoint
  honorLabels: true
  ## Specify the release for ServiceMonitor. Sometimes it should be custom for prometheus operator to work
  # release: ""
  ## ref: https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md#prometheusspec
  # -- Used to pass Labels that are used by the Prometheus installed in your cluster to select Service Monitors to work with
  additionalLabels: {}

webhook:
  # -- Enable or disable webhooks
  enabled: true
  # -- Configuration for webhook certificate jobs
  initContainer:
    # -- Image for webhook readiness check init container
    image: curlimages/curl:8.8.0
  # -- Pod security context for webhook jobs
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  # -- Container security context for webhook jobs
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
  certgen:
    registry: registry.k8s.io
    repository: ingress-nginx/kube-webhook-certgen
    tag: v20231011-8b53cabe0

## seaweedfs-operator containers' resource requests and limits.
## ref: http://kubernetes.io/docs/user-guide/compute-resources/
resources:
  limits:
    # -- seaweedfs-operator containers' cpu limit (maximum allowed CPU)
    cpu: 500m
    # -- seaweedfs-operator containers' memory limit (maximum allowed memory)
    memory: 500Mi
  requests:
    # -- seaweedfs-operator containers' cpu request (how much is requested by default)
    cpu: 100m
    # -- seaweedfs-operator containers' memory request (how much is requested by default)
    memory: 50Mi

## Security context for pods
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

## Security context for containers
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

## Node labels for pod assignment
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
nodeSelector: {}

## Tolerations for pod assignment
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
tolerations: []

## Affinity for pod assignment
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
affinity: {}
