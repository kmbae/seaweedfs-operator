enabled: true

# Filer address for CSI node plugin (cluster DNS)
filer:
  address: "seaweedfs-filer.seaweedfs:8888"

# Kubelet root directory (MicroK8s example below; standard k8s: /var/lib/kubelet)
kubelet:
  rootDir: /var/snap/microk8s/common/var/lib/kubelet

storageClass:
  create: true
  name: seaweedfs-storage

# Extra flags appended to every `weed mount` invocation (via weed-rdma-wrapper).
# Match pjdfstest / fuse_integration defaults for POSIX directory nlink.
mount:
  extraArgs:
    - "-posix.dirNLink=true"
    - "-dlm=true"

images:
  # v1.4.20+ applies PVC capacity as collectionQuotaMB at mount time (PR #279).
  csiDriver: chrislusf/seaweedfs-csi-driver:v1.4.20
  mount: chrislusf/seaweedfs-mount:v1.4.20
  weedCopy: kmbae27/seaweedfs:rdma-20260625-7f092413
  nodeRegistrar: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.8.0
  provisioner: registry.k8s.io/sig-storage/csi-provisioner:v3.5.0
  attacher: registry.k8s.io/sig-storage/csi-attacher:v4.3.0
  resizer: registry.k8s.io/sig-storage/csi-resizer:v1.8.0
  livenessProbe: registry.k8s.io/sig-storage/livenessprobe:v2.10.0

rdma:
  enabled: true
  # sriov: attach a VF through Multus/SR-IOV.
  # hostPF: use the node host RDMA PF for lab validation.
  mode: hostPF
  gatewayImage: python:3.12-alpine
  configMapName: seaweedfs-csi-rdma
  gatewayPort: 18081
  volumeSidecarPort: 8081
  volumeNamespace: seaweedfs
  volumeNetworkName: "default/sriov-ib-network"
  workerEngine:
    enabled: true
    image: kmbae27/rdma-engine:rdma-20260625-7f092413
    imagePullPolicy: Always
    deviceName: mlx5_1
    ucxTls: rc_verbs,ud_verbs,tcp,self
    ucxNetDevices: ""
    socketDir: /tmp/rdma
    socketPath: /tmp/rdma/rdma-engine.sock
    port: 28515
    debug: true
    realInitRetries: 180
    realInitRetryIntervalMs: 1000
    multusNetworks: "default/sriov-ib-network"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  workerSidecar:
    enabled: true
    image: kmbae27/rdma-sidecar:rdma-20260625-27d16fc1
    imagePullPolicy: Always
    port: 18082
    debug: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
