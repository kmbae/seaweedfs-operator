{{- if .Values.rdma.enabled }}
# CSI mount RDMA integration: node-local gateway + weed mount wrapper.
# Apply after seaweedfs-csi.yaml: kubectl apply -f deploy/csi-rdma/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-csi-rdma
  namespace: {{ .Release.Namespace }}
data:
  weed-rdma-wrapper.sh: |
    #!/bin/sh
    set -eu
    REAL_WEED="${WEED_REAL_BINARY:-weed}"
    if ! command -v "${REAL_WEED}" >/dev/null 2>&1; then
      for candidate in /usr/bin/weed /usr/local/bin/weed; do
        if [ -x "${candidate}" ]; then
          REAL_WEED="${candidate}"
          break
        fi
      done
    fi

    append_mount_extra_args() {
      if [ -n "${WEED_MOUNT_EXTRA_ARGS:-}" ]; then
        # shellcheck disable=SC2086
        set -- "$@" ${WEED_MOUNT_EXTRA_ARGS}
      fi
    }

    storage_to_quota_mb() {
      s="$1"
      num="${s%%[!0-9]*}"
      unit="${s#"$num"}"
      case "$unit" in
        Ei) echo $((num * 1024 * 1024 * 1024)) ;;
        Pi) echo $((num * 1024 * 1024)) ;;
        Ti) echo $((num * 1024)) ;;
        Gi) echo $((num * 1024)) ;;
        Mi) echo "$num" ;;
        Ki) echo $(( (num + 1023) / 1024 )) ;;
        "") echo $(( (num + 1048575) / 1048576 )) ;;
        *) echo 0 ;;
      esac
    }

    k8s_get_pv_storage() {
      pv_name="$1"
      token=""
      host=""
      port=""
      token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null) || return 1
      host="${KUBERNETES_SERVICE_HOST:-}"
      port="${KUBERNETES_SERVICE_PORT:-443}"
      [ -n "$host" ] || return 1
      wget -qO- --header "Authorization: Bearer ${token}" --no-check-certificate \
        "https://${host}:${port}/api/v1/persistentvolumes/${pv_name}" 2>/dev/null \
        | sed -n 's/.*"storage"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1
    }

    inject_collection_quota_mb_if_needed() {
      collection=""
      filer_path=""
      quota_set=false
      storage=""
      quota_mb=""
      for arg in "$@"; do
        case "$arg" in
          -collection=*) collection="${arg#-collection=}" ;;
          -filer.path=*) filer_path="${arg#-filer.path=}" ;;
          -collectionQuotaMB=*) quota_set=true ;;
        esac
      done
      if [ "$quota_set" = true ]; then
        return 0
      fi
      if [ -z "$collection" ] && [ -n "$filer_path" ]; then
        collection="${filer_path##*/}"
      fi
      [ -n "$collection" ] || return 0
      storage=$(k8s_get_pv_storage "$collection") || return 0
      [ -n "$storage" ] || return 0
      quota_mb=$(storage_to_quota_mb "$storage")
      [ "$quota_mb" -gt 0 ] 2>/dev/null || return 0
      set -- "$@" "-collectionQuotaMB=${quota_mb}"
    }

    has_mount=false
    for arg in "$@"; do
      if [ "${arg}" = "mount" ]; then
        has_mount=true
        break
      fi
    done

    if [ "${has_mount}" = "true" ]; then
      append_mount_extra_args
      inject_collection_quota_mb_if_needed
    fi

    if [ "${RDMA_ENABLED:-false}" != "true" ]; then
      exec "${REAL_WEED}" "$@"
    fi

    if [ "${has_mount}" != "true" ]; then
      exec "${REAL_WEED}" "$@"
    fi

    exec "${REAL_WEED}" "$@" \
      -rdma.enabled=true \
      -rdma.sidecar="${RDMA_SIDECAR_ADDR:-127.0.0.1:18081}" \
      -rdma.fallback="${RDMA_FALLBACK:-true}" \
      -rdma.readOnly="${RDMA_READ_ONLY:-false}" \
      -rdma.maxConcurrent="${RDMA_MAX_CONCURRENT:-64}" \
      -rdma.timeoutMs="${RDMA_TIMEOUT_MS:-5000}"

  rdma-gateway.py: |
    #!/usr/bin/env python3
    """Proxy weed mount RDMA HTTP API to per-volume rdma-sidecar pods (port 8081)."""
    import json
    import os
    import sys
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import parse_qs, urlparse

    SIDECAR_PORT = int(os.environ.get("RDMA_SIDECAR_PORT", "8081"))
    LISTEN_HOST = os.environ.get("RDMA_GATEWAY_HOST", "127.0.0.1")
    LISTEN_PORT = int(os.environ.get("RDMA_GATEWAY_PORT", "18081"))


    def sidecar_base_url(volume_server: str) -> str:
        parsed = urlparse(volume_server)
        if not parsed.hostname:
            raise ValueError("invalid volume_server: %r" % (volume_server,))
        return "http://%s:%d" % (parsed.hostname, SIDECAR_PORT)


    class GatewayHandler(BaseHTTPRequestHandler):
        protocol_version = "HTTP/1.1"

        def log_message(self, fmt, *args):
            sys.stderr.write("[rdma-gateway] %s - %s\n" % (self.address_string(), fmt % args))

        def do_GET(self):
            self._proxy()

        def do_POST(self):
            self._proxy()

        def do_DELETE(self):
            self._proxy()

        def _local_health(self):
            body = json.dumps(
                {
                    "status": "healthy",
                    "rdma": {"enabled": True, "connected": True},
                    "gateway": True,
                }
            ).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def _proxy(self):
            parsed = urlparse(self.path)
            if parsed.path == "/health":
                self._local_health()
                return

            qs = parse_qs(parsed.query, keep_blank_values=True)
            vs_list = qs.get("volume_server")
            if not vs_list or not vs_list[0]:
                self.send_error(400, "volume_server query parameter is required")
                return

            try:
                upstream = sidecar_base_url(vs_list[0]) + parsed.path
                if parsed.query:
                    upstream += "?" + parsed.query
            except ValueError as exc:
                self.send_error(400, str(exc))
                return

            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length) if length > 0 else None
            req = urllib.request.Request(
                upstream,
                data=body,
                method=self.command,
            )
            for header in ("Content-Type",):
                if header in self.headers:
                    req.add_header(header, self.headers[header])

            try:
                with urllib.request.urlopen(req, timeout=120) as resp:
                    data = resp.read()
                    self.send_response(resp.status)
                    for key, value in resp.headers.items():
                        if key.lower() in (
                            "content-type",
                            "content-length",
                            "x-source",
                            "x-rdma-used",
                            "x-temp-file",
                            "x-use-temp-file",
                        ):
                            self.send_header(key, value)
                    self.end_headers()
                    if data:
                        self.wfile.write(data)
            except urllib.error.HTTPError as err:
                data = err.read()
                self.send_response(err.code)
                self.send_header("Content-Type", err.headers.get("Content-Type", "text/plain"))
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                if data:
                    self.wfile.write(data)
            except Exception as exc:
                self.send_error(502, "upstream rdma-sidecar: %s" % exc)


    if __name__ == "__main__":
        server = ThreadingHTTPServer((LISTEN_HOST, LISTEN_PORT), GatewayHandler)
        sys.stderr.write(
            "rdma-gateway listening on %s:%d -> volume sidecar :%d\n"
            % (LISTEN_HOST, LISTEN_PORT, SIDECAR_PORT)
        )
        server.serve_forever()

{{- end }}
