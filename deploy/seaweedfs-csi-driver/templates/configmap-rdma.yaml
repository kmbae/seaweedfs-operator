{{- if .Values.rdma.enabled }}
# CSI mount RDMA integration: node-local gateway + weed mount wrapper.
# Apply after seaweedfs-csi.yaml: kubectl apply -f deploy/csi-rdma/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.rdma.configMapName }}
  namespace: {{ .Release.Namespace }}
data:
  weed-rdma-wrapper.sh: |
    #!/bin/sh
    set -eu
    REAL_WEED="${WEED_REAL_BINARY:-weed}"
    if ! command -v "${REAL_WEED}" >/dev/null 2>&1; then
      for candidate in /usr/bin/weed /usr/local/bin/weed; do
        if [ -x "${candidate}" ]; then
          REAL_WEED="${candidate}"
          break
        fi
      done
    fi

    append_mount_extra_args() {
      if [ -n "${WEED_MOUNT_EXTRA_ARGS:-}" ]; then
        # shellcheck disable=SC2086
        set -- "$@" ${WEED_MOUNT_EXTRA_ARGS}
      fi
    }

    storage_to_quota_mb() {
      s="$1"
      num="${s%%[!0-9]*}"
      unit="${s#"$num"}"
      case "$unit" in
        Ei) echo $((num * 1024 * 1024 * 1024)) ;;
        Pi) echo $((num * 1024 * 1024)) ;;
        Ti) echo $((num * 1024)) ;;
        Gi) echo $((num * 1024)) ;;
        Mi) echo "$num" ;;
        Ki) echo $(( (num + 1023) / 1024 )) ;;
        "") echo $(( (num + 1048575) / 1048576 )) ;;
        *) echo 0 ;;
      esac
    }

    k8s_get_pv_storage() {
      pv_name="$1"
      token=""
      host=""
      port=""
      token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null) || return 1
      host="${KUBERNETES_SERVICE_HOST:-}"
      port="${KUBERNETES_SERVICE_PORT:-443}"
      [ -n "$host" ] || return 1
      wget -qO- --header "Authorization: Bearer ${token}" --no-check-certificate \
        "https://${host}:${port}/api/v1/persistentvolumes/${pv_name}" 2>/dev/null \
        | sed -n 's/.*"storage"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1
    }

    inject_collection_quota_mb_if_needed() {
      collection=""
      filer_path=""
      quota_set=false
      storage=""
      quota_mb=""
      for arg in "$@"; do
        case "$arg" in
          -collection=*) collection="${arg#-collection=}" ;;
          -filer.path=*) filer_path="${arg#-filer.path=}" ;;
          -collectionQuotaMB=*) quota_set=true ;;
        esac
      done
      if [ "$quota_set" = true ]; then
        return 0
      fi
      if [ -z "$collection" ] && [ -n "$filer_path" ]; then
        collection="${filer_path##*/}"
      fi
      [ -n "$collection" ] || return 0
      storage=$(k8s_get_pv_storage "$collection") || return 0
      [ -n "$storage" ] || return 0
      quota_mb=$(storage_to_quota_mb "$storage")
      [ "$quota_mb" -gt 0 ] 2>/dev/null || return 0
      set -- "$@" "-collectionQuotaMB=${quota_mb}"
    }

    has_mount=false
    for arg in "$@"; do
      if [ "${arg}" = "mount" ]; then
        has_mount=true
        break
      fi
    done

    if [ "${has_mount}" = "true" ]; then
      append_mount_extra_args
      inject_collection_quota_mb_if_needed
    fi

    if [ "${RDMA_ENABLED:-false}" != "true" ]; then
      exec "${REAL_WEED}" "$@"
    fi

    if [ "${has_mount}" != "true" ]; then
      exec "${REAL_WEED}" "$@"
    fi

    exec "${REAL_WEED}" "$@" \
      -rdma.enabled=true \
      -rdma.sidecar="${RDMA_SIDECAR_ADDR:-127.0.0.1:18081}" \
      -rdma.fallback="${RDMA_FALLBACK:-true}" \
      -rdma.readOnly="${RDMA_READ_ONLY:-false}" \
      -rdma.maxConcurrent="${RDMA_MAX_CONCURRENT:-64}" \
      -rdma.timeoutMs="${RDMA_TIMEOUT_MS:-5000}"

  rdma-gateway.py: |
    #!/usr/bin/env python3
    """Proxy weed mount RDMA HTTP API to per-volume rdma-sidecar pods."""
    import json
    import os
    import ssl
    import sys
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from urllib.parse import parse_qs, quote, urlencode, urlparse

    SIDECAR_PORT = int(os.environ.get("RDMA_SIDECAR_PORT", "8081"))
    LISTEN_HOST = os.environ.get("RDMA_GATEWAY_HOST", "127.0.0.1")
    LISTEN_PORT = int(os.environ.get("RDMA_GATEWAY_PORT", "18081"))
    RDMA_REQUEST_TIMEOUT = float(os.environ.get("RDMA_REQUEST_TIMEOUT", "300"))
    RDMA_VOLUME_NAMESPACE = os.environ.get("RDMA_VOLUME_NAMESPACE", "seaweedfs")
    RDMA_NETWORK_NAME = os.environ.get("RDMA_NETWORK_NAME", "")
    RDMA_WORKER_SIDECAR_URL = os.environ.get("RDMA_WORKER_SIDECAR_URL", "").rstrip("/")
    RDMA_HOSTPF_FALLBACK = os.environ.get("RDMA_HOSTPF_FALLBACK", "false").lower() in ("1", "true", "yes", "on")
    SERVICEACCOUNT_DIR = "/var/run/secrets/kubernetes.io/serviceaccount"
    RDMA_SERVER_CACHE = {}


    def parsed_volume(volume_server: str):
        target = volume_server if "://" in volume_server else "http://" + volume_server
        return urlparse(target)


    def sidecar_base_url(volume_server: str) -> str:
        parsed = parsed_volume(volume_server)
        if not parsed.hostname:
            raise ValueError("invalid volume_server: %r" % (volume_server,))
        return "http://%s:%d" % (parsed.hostname, SIDECAR_PORT)


    def volume_host(volume_server: str) -> str:
        return parsed_volume(volume_server).hostname or ""


    def read_serviceaccount_file(name: str) -> str:
        with open(os.path.join(SERVICEACCOUNT_DIR, name), "r", encoding="utf-8") as f:
            return f.read().strip()


    def kube_get(path: str):
        host = os.environ.get("KUBERNETES_SERVICE_HOST", "")
        port = os.environ.get("KUBERNETES_SERVICE_PORT", "443")
        if not host:
            return None
        try:
            token = read_serviceaccount_file("token")
        except OSError:
            return None
        req = urllib.request.Request("https://%s:%s%s" % (host, port, path))
        req.add_header("Authorization", "Bearer %s" % token)
        try:
            with urllib.request.urlopen(
                req,
                timeout=2,
                context=ssl._create_unverified_context(),
            ) as resp:
                return json.loads(resp.read())
        except Exception as exc:
            sys.stderr.write("[rdma-gateway] kube lookup failed for %s: %s\n" % (path, exc))
            return None


    def pod_from_volume_host(host: str):
        if not host:
            return None
        if all(ch.isdigit() or ch == "." for ch in host):
            selector = quote("status.podIP=%s" % host, safe="")
            data = kube_get("/api/v1/pods?fieldSelector=%s" % selector)
            items = (data or {}).get("items") or []
            return items[0] if items else None

        parts = host.split(".")
        pod_name = parts[0]
        namespace = RDMA_VOLUME_NAMESPACE
        if len(parts) >= 3:
            namespace = parts[2]
        return kube_get("/api/v1/namespaces/%s/pods/%s" % (namespace, pod_name))


    def rdma_ip_from_pod(pod) -> str:
        annotations = (((pod or {}).get("metadata") or {}).get("annotations") or {})
        raw_status = annotations.get("k8s.v1.cni.cncf.io/network-status", "")
        if not raw_status:
            return ""
        try:
            networks = json.loads(raw_status)
        except json.JSONDecodeError:
            return ""
        expected_names = {RDMA_NETWORK_NAME, RDMA_NETWORK_NAME.split("/")[-1]}
        for network in networks:
            name = network.get("name", "")
            if RDMA_NETWORK_NAME and name not in expected_names:
                continue
            ips = network.get("ips") or []
            if ips:
                return ips[0]
        return ""


    def hostpf_rdma_ip_from_pod_or_host(pod, host: str) -> str:
        if not RDMA_HOSTPF_FALLBACK:
            return ""
        status = ((pod or {}).get("status") or {})
        return status.get("podIP") or status.get("hostIP") or host


    def rdma_server_for_volume(volume_server: str) -> str:
        if not RDMA_NETWORK_NAME and not RDMA_HOSTPF_FALLBACK:
            return ""
        host = volume_host(volume_server)
        if host in RDMA_SERVER_CACHE:
            return RDMA_SERVER_CACHE[host]
        pod = pod_from_volume_host(host)
        ip = rdma_ip_from_pod(pod)
        source = "multus"
        if not ip:
            ip = hostpf_rdma_ip_from_pod_or_host(pod, host)
            source = "hostPF"
        rdma_server = "http://%s" % ip if ip else ""
        RDMA_SERVER_CACHE[host] = rdma_server
        if rdma_server:
            sys.stderr.write(
                "[rdma-gateway] %s uses %s RDMA data-plane %s\n" % (volume_server, source, rdma_server)
            )
        return rdma_server


    def upstream_base_url(volume_server: str) -> str:
        if RDMA_WORKER_SIDECAR_URL:
            return RDMA_WORKER_SIDECAR_URL
        return sidecar_base_url(volume_server)


    class GatewayHandler(BaseHTTPRequestHandler):
        protocol_version = "HTTP/1.1"

        def log_message(self, fmt, *args):
            sys.stderr.write("[rdma-gateway] %s - %s\n" % (self.address_string(), fmt % args))

        def do_GET(self):
            self._proxy()

        def do_POST(self):
            self._proxy()

        def do_DELETE(self):
            self._proxy()

        def _local_health(self):
            body = json.dumps(
                {
                    "status": "healthy",
                    "rdma": {"enabled": True, "connected": True},
                    "gateway": True,
                    "worker_engine_socket": os.environ.get("RDMA_ENGINE_SOCKET", ""),
                }
            ).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def _proxy(self):
            parsed = urlparse(self.path)
            if parsed.path == "/health":
                self._local_health()
                return

            qs = parse_qs(parsed.query, keep_blank_values=True)
            vs_list = qs.get("volume_server")
            if not vs_list or not vs_list[0]:
                self.send_error(400, "volume_server query parameter is required")
                return

            try:
                upstream = upstream_base_url(vs_list[0]) + parsed.path
                rdma_server = rdma_server_for_volume(vs_list[0])
                if rdma_server:
                    qs["rdma_server"] = [rdma_server]
                forward_query = urlencode(qs, doseq=True)
                if forward_query:
                    upstream += "?" + forward_query
            except ValueError as exc:
                self.send_error(400, str(exc))
                return

            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length) if length > 0 else None
            req = urllib.request.Request(
                upstream,
                data=body,
                method=self.command,
            )
            for header in ("Content-Type",):
                if header in self.headers:
                    req.add_header(header, self.headers[header])

            try:
                with urllib.request.urlopen(req, timeout=RDMA_REQUEST_TIMEOUT) as resp:
                    data = resp.read()
                    self.send_response(resp.status)
                    for key, value in resp.headers.items():
                        if key.lower() in (
                            "content-type",
                            "content-length",
                            "x-source",
                            "x-rdma-used",
                            "x-rdma-session-used",
                            "x-real-rdma",
                            "x-data-source",
                            "x-temp-file",
                            "x-use-temp-file",
                        ):
                            self.send_header(key, value)
                    self.end_headers()
                    if data:
                        self.wfile.write(data)
            except urllib.error.HTTPError as err:
                data = err.read()
                self.send_response(err.code)
                self.send_header("Content-Type", err.headers.get("Content-Type", "text/plain"))
                self.send_header("Content-Length", str(len(data)))
                self.end_headers()
                if data:
                    self.wfile.write(data)
            except Exception as exc:
                self.send_error(502, "upstream rdma-sidecar: %s" % exc)


    if __name__ == "__main__":
        server = ThreadingHTTPServer((LISTEN_HOST, LISTEN_PORT), GatewayHandler)
        sys.stderr.write(
            "rdma-gateway listening on %s:%d -> volume sidecar :%d\n"
            % (LISTEN_HOST, LISTEN_PORT, SIDECAR_PORT)
        )
        server.serve_forever()

{{- end }}
