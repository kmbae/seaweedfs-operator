{{- if .Values.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: {{ .Release.Namespace }}
  name: seaweedfs-controller-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  namespace: {{ .Release.Namespace }}
  name: seaweedfs-node-sa
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-provisioner-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: [ "" ]
    resources: [ "persistentvolumeclaims/status" ]
    verbs: [ "get", "list", "watch", "update", "patch" ]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list"]
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get", "list", "watch" ]
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-attacher-role
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["csi.storage.k8s.io"]
    resources: ["csinodeinfos"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments", "volumeattachments/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-driver-registrar-controller-role
rules:
  - apiGroups: ["csi.storage.k8s.io"]
    resources: ["csidrivers"]
    verbs: ["create", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-driver-registrar-node-role
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-provisioner-binding
subjects:
  - kind: ServiceAccount
    name: seaweedfs-controller-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: seaweedfs-provisioner-role
  apiGroup: rbac.authorization.k8s.io
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-attacher-binding
subjects:
  - kind: ServiceAccount
    name: seaweedfs-controller-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: seaweedfs-attacher-role
  apiGroup: rbac.authorization.k8s.io
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-driver-registrar-controller-binding
subjects:
  - kind: ServiceAccount
    name: seaweedfs-controller-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: seaweedfs-driver-registrar-controller-role
  apiGroup: rbac.authorization.k8s.io
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-driver-registrar-node-binding
subjects:
  - kind: ServiceAccount
    name: seaweedfs-node-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: seaweedfs-driver-registrar-node-role
  apiGroup: rbac.authorization.k8s.io
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-leader-election-controller-role
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "watch", "list", "delete", "update", "create"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: seaweedfs-leader-election-controller-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    namespace: {{ .Release.Namespace }}
    name: seaweedfs-controller-sa
roleRef:
  kind: Role
  name: seaweedfs-leader-election-controller-role
  apiGroup: rbac.authorization.k8s.io
---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  namespace: {{ .Release.Namespace }}
  name: seaweedfs-mount
spec:
  selector:
    matchLabels:
      app: seaweedfs-mount
  updateStrategy:
    
    type: OnDelete
  template:
    metadata:
      labels:
        app: seaweedfs-mount
{{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled .Values.rdma.workerEngine.multusNetworks (ne (default "sriov" .Values.rdma.mode) "hostPF") }}
      annotations:
        k8s.v1.cni.cncf.io/networks: {{ .Values.rdma.workerEngine.multusNetworks | quote }}
{{ end }}
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: seaweedfs-node-sa
{{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled (eq (default "sriov" .Values.rdma.mode) "hostPF") }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
{{ end }}
      initContainers:
        - name: copy-weed
          image: {{ .Values.images.weedCopy }}
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - cp /usr/bin/weed /weed-bin/weed && chmod +x /weed-bin/weed
          volumeMounts:
            - name: weed-bin
              mountPath: /weed-bin
      containers:
        - name: seaweedfs-mount
          securityContext: 
            allowPrivilegeEscalation: true
            capabilities:
              add:
              - SYS_ADMIN
            privileged: true
          image: {{ .Values.images.mount }}
          imagePullPolicy: IfNotPresent
          args:
            - --endpoint=$(MOUNT_ENDPOINT)
            - --weedBinary=/csi-rdma/weed-rdma-wrapper.sh
          env:
            - name: MOUNT_ENDPOINT
              value: "unix:///var/lib/seaweedfs-mount/seaweedfs-mount.sock"
            - name: RDMA_ENABLED
              value: "true"
            - name: RDMA_SIDECAR_ADDR
              value: "127.0.0.1:{{ .Values.rdma.gatewayPort }}"
            - name: RDMA_FALLBACK
              value: "true"
            - name: RDMA_READ_ONLY
              value: "false"
            - name: WEED_REAL_BINARY
              value: "/weed-bin/weed"
            {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled }}
            - name: RDMA_ENGINE_SOCKET
              value: {{ .Values.rdma.workerEngine.socketPath | quote }}
            {{ end }}
            {{- if .Values.mount.extraArgs }}
            - name: WEED_MOUNT_EXTRA_ARGS
              value: {{ join " " .Values.mount.extraArgs | quote }}
            {{- end }}
          volumeMounts:
            - name: weed-bin
              mountPath: /weed-bin
              readOnly: true
            - name: plugins-dir
              mountPath: {{ .Values.kubelet.rootDir }}/plugins
              mountPropagation: "Bidirectional"
            - name: pods-mount-dir
              mountPath: {{ .Values.kubelet.rootDir }}/pods
              mountPropagation: "Bidirectional"
            - name: device-dir
              mountPath: /dev
            - name: cache
              mountPath: /var/cache/seaweedfs
            - name: mount-socket-dir
              mountPath: /var/lib/seaweedfs-mount
            - name: csi-rdma-scripts
              mountPath: /csi-rdma
            {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled }}
            - name: rdma-engine-socket
              mountPath: {{ .Values.rdma.workerEngine.socketDir | quote }}
            {{ end }}
        - name: rdma-gateway
          image: {{ .Values.rdma.gatewayImage }}
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /csi-rdma/rdma-gateway.py
          env:
            - name: RDMA_SIDECAR_PORT
              value: {{ .Values.rdma.volumeSidecarPort | quote }}
            - name: RDMA_GATEWAY_HOST
              value: "127.0.0.1"
            - name: RDMA_GATEWAY_PORT
              value: {{ .Values.rdma.gatewayPort | quote }}
            - name: RDMA_VOLUME_NAMESPACE
              value: {{ .Values.rdma.volumeNamespace | quote }}
            - name: RDMA_NETWORK_NAME
              value: {{ .Values.rdma.volumeNetworkName | quote }}
            {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled .Values.rdma.workerSidecar.enabled }}
            - name: RDMA_WORKER_SIDECAR_URL
              value: "http://127.0.0.1:{{ .Values.rdma.workerSidecar.port }}"
            {{ end }}
            {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled }}
            - name: RDMA_ENGINE_SOCKET
              value: {{ .Values.rdma.workerEngine.socketPath | quote }}
            {{ end }}
          ports:
            - name: rdma-gw
              containerPort: {{ .Values.rdma.gatewayPort }}
              hostPort: {{ .Values.rdma.gatewayPort }}
              protocol: TCP
          volumeMounts:
            - name: csi-rdma-scripts
              mountPath: /csi-rdma
              readOnly: true
            {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled }}
            - name: rdma-engine-socket
              mountPath: {{ .Values.rdma.workerEngine.socketDir | quote }}
            {{ end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
        {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled .Values.rdma.workerSidecar.enabled }}
        - name: rdma-sidecar
          image: {{ .Values.rdma.workerSidecar.image }}
          imagePullPolicy: {{ .Values.rdma.workerSidecar.imagePullPolicy }}
          args:
            - --port
            - {{ .Values.rdma.workerSidecar.port | quote }}
            - --engine-socket
            - {{ .Values.rdma.workerEngine.socketPath | quote }}
            - --volume-server
            - "http://127.0.0.1:8444"
            - --enable-rdma=true
            {{ if .Values.rdma.workerSidecar.debug }}
            - --debug
            {{ end }}
          ports:
            - name: rdma-sidecar
              containerPort: {{ .Values.rdma.workerSidecar.port }}
              protocol: TCP
          volumeMounts:
            - name: rdma-engine-socket
              mountPath: {{ .Values.rdma.workerEngine.socketDir | quote }}
          resources:
{{ toYaml .Values.rdma.workerSidecar.resources | nindent 12 }}
        {{ end }}
        {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled }}
        - name: rdma-engine
          image: {{ .Values.rdma.workerEngine.image }}
          imagePullPolicy: {{ .Values.rdma.workerEngine.imagePullPolicy }}
          command:
            - ./rdma-engine-server
            {{ if .Values.rdma.workerEngine.debug }}
            - --debug
            {{ end }}
            {{ if .Values.rdma.workerEngine.deviceName }}
            - --device
            - {{ .Values.rdma.workerEngine.deviceName | quote }}
            {{ end }}
            - --ipc-socket
            - {{ .Values.rdma.workerEngine.socketPath | quote }}
            - --port
            - {{ .Values.rdma.workerEngine.port | quote }}
            {{ if .Values.rdma.workerEngine.realInitRetries }}
            - --real-init-retries
            - {{ .Values.rdma.workerEngine.realInitRetries | quote }}
            {{ end }}
            {{ if .Values.rdma.workerEngine.realInitRetryIntervalMs }}
            - --real-init-retry-interval-ms
            - {{ .Values.rdma.workerEngine.realInitRetryIntervalMs | quote }}
            {{ end }}
          env:
            {{ if .Values.rdma.workerEngine.ucxTls }}
            - name: UCX_TLS
              value: {{ .Values.rdma.workerEngine.ucxTls | quote }}
            {{ end }}
            - name: RDMA_LISTEN_PORT
              value: {{ .Values.rdma.workerEngine.port | quote }}
            {{ if .Values.rdma.workerEngine.ucxNetDevices }}
            - name: UCX_NET_DEVICES
              value: {{ .Values.rdma.workerEngine.ucxNetDevices | quote }}
            {{ else if and (eq (default "sriov" .Values.rdma.mode) "hostPF") .Values.rdma.workerEngine.deviceName }}
            - name: UCX_NET_DEVICES
              value: {{ printf "%s:1" .Values.rdma.workerEngine.deviceName | quote }}
            {{ end }}
          ports:
            - name: rdma-engine
              containerPort: {{ .Values.rdma.workerEngine.port }}
              protocol: TCP
          {{ if eq (default "sriov" .Values.rdma.mode) "hostPF" }}
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - IPC_LOCK
                - NET_ADMIN
                - SYS_ADMIN
                - SYS_RESOURCE
          {{ end }}
          volumeMounts:
            - name: rdma-engine-socket
              mountPath: {{ .Values.rdma.workerEngine.socketDir | quote }}
            - name: device-dir
              mountPath: /dev
          resources:
{{ toYaml .Values.rdma.workerEngine.resources | nindent 12 }}
        {{ end }}
      volumes:
        - name: weed-bin
          emptyDir: {}
        - name: csi-rdma-scripts
          configMap:
            name: {{ .Values.rdma.configMapName }}
            defaultMode: 0755
        {{ if and .Values.rdma.enabled .Values.rdma.workerEngine.enabled }}
        - name: rdma-engine-socket
          emptyDir: {}
        {{ end }}
        - name: plugins-dir
          hostPath:
            path: {{ .Values.kubelet.rootDir }}/plugins
            type: Directory
        - name: pods-mount-dir
          hostPath:
            path: {{ .Values.kubelet.rootDir }}/pods
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
        - name: cache
          emptyDir: {}
        - name: mount-socket-dir
          hostPath:
            path: /var/lib/seaweedfs-mount
            type: DirectoryOrCreate
---
kind: DaemonSet
apiVersion: apps/v1
metadata:
  namespace: {{ .Release.Namespace }}
  name: seaweedfs-node
spec:
  selector:
    matchLabels:
      app: seaweedfs-node
  updateStrategy:
    
    rollingUpdate:
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: seaweedfs-node
    spec:
      priorityClassName: system-node-critical
      serviceAccountName: seaweedfs-node-sa
      hostPID: true
      #hostNetwork: true
      #dnsPolicy: ClusterFirstWithHostNet
      containers:
        # SeaweedFs Plugin (node)
        - name: csi-seaweedfs-plugin
          securityContext: 
            allowPrivilegeEscalation: true
            capabilities:
              add:
              - SYS_ADMIN
            privileged: true
          image: {{ .Values.images.csiDriver }}
          imagePullPolicy: IfNotPresent
          args:
            - --endpoint=$(CSI_ENDPOINT)
            - --filer=$(SEAWEEDFS_FILER)
            - --nodeid=$(NODE_ID)
            - --driverName=$(DRIVER_NAME)
            - --mountEndpoint=$(MOUNT_ENDPOINT)
            - --cacheDir=/var/cache/seaweedfs
            - --components=node
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: SEAWEEDFS_FILER
              value: {{ .Values.filer.address | quote }}
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DRIVER_NAME
              value: "seaweedfs-csi-driver"
            - name: MOUNT_ENDPOINT
              value: "unix:///var/lib/seaweedfs-mount/seaweedfs-mount.sock"
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: plugins-dir
              mountPath: {{ .Values.kubelet.rootDir }}/plugins
              mountPropagation: "Bidirectional"
            - name: pods-mount-dir
              mountPath: {{ .Values.kubelet.rootDir }}/pods
              mountPropagation: "Bidirectional"
            - mountPath: /dev
              name: device-dir
            - name: cache
              mountPath: /var/cache/seaweedfs
            - name: mount-socket-dir
              mountPath: /var/lib/seaweedfs-mount
          resources: {}

        # driver registrar
        - name: driver-registrar
          image: {{ .Values.images.nodeRegistrar }}
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)
            - --http-endpoint=:9809
            #- --v=5
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: {{ .Values.kubelet.rootDir }}/plugins/seaweedfs-csi-driver/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 9809
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9809
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 60
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi/
            - name: registration-dir
              mountPath: /registration/
          resources: 
            {}

        # liveness probe
        - name: csi-liveness-probe
          image: {{ .Values.images.livenessProbe }}
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --http-endpoint=:9808
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          ports:
            - containerPort: 9808
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9808
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 60
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
          resources: 
            {}

      volumes:
        - name: registration-dir
          hostPath:
            path: {{ .Values.kubelet.rootDir }}/plugins_registry
            type: DirectoryOrCreate
        - name: plugin-dir
          hostPath:
            path: {{ .Values.kubelet.rootDir }}/plugins/seaweedfs-csi-driver
            type: DirectoryOrCreate
        - name: plugins-dir
          hostPath:
            path: {{ .Values.kubelet.rootDir }}/plugins
            type: Directory
        - name: pods-mount-dir
          hostPath:
            path: {{ .Values.kubelet.rootDir }}/pods
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
        - name: cache
          emptyDir: {}
        - name: mount-socket-dir
          hostPath:
            path: /var/lib/seaweedfs-mount
            type: DirectoryOrCreate
---
kind: Deployment
apiVersion: apps/v1
metadata:
  namespace: {{ .Release.Namespace }}
  name: seaweedfs-controller
spec:
  selector:
    matchLabels:
      app: seaweedfs-controller
  replicas: 1
  template:
    metadata:
      labels:
        app: seaweedfs-controller
    spec:
      priorityClassName: system-cluster-critical
      serviceAccountName: seaweedfs-controller-sa
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - seaweedfs-controller
              topologyKey: kubernetes.io/hostname
      containers:
        # SeaweedFs Plugin (controller)
        - name: seaweedfs-csi-plugin
          image: {{ .Values.images.csiDriver }}
          imagePullPolicy: IfNotPresent
          args :
            - --endpoint=$(CSI_ENDPOINT)
            - --filer=$(SEAWEEDFS_FILER)

            - --driverName=$(DRIVER_NAME)
            - --components=controller
            - --attacher=true
          env:
            - name: CSI_ENDPOINT
              value: unix:///var/lib/csi/sockets/pluginproxy/csi.sock
            - name: SEAWEEDFS_FILER
              value: {{ .Values.filer.address | quote }}

            - name: DRIVER_NAME
              value: "seaweedfs-csi-driver"
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources: 
            {}

        # provisioner
        - name: csi-provisioner
          image: {{ .Values.images.provisioner }}
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --leader-election
            - --leader-election-namespace={{ .Release.Namespace }}
            - --http-endpoint=:9809
            #- --v=9
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          ports:
            - containerPort: 9809
          livenessProbe:
            httpGet:
              path: /healthz/leader-election
              port: 9809
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 60
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources: 
            {}

        # resizer
        - name: csi-resizer
          image: {{ .Values.images.resizer }}
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --leader-election
            - --leader-election-namespace={{ .Release.Namespace }}
            - --http-endpoint=:9810
            #- --v=5
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          ports:
            - containerPort: 9810
          livenessProbe:
            httpGet:
              path: /healthz/leader-election
              port: 9810
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 60
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources: 
            {}
        # attacher
        - name: csi-attacher
          image: {{ .Values.images.attacher }}
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --leader-election
            - --leader-election-namespace={{ .Release.Namespace }}
            - --http-endpoint=:9811
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          ports:
            - containerPort: 9811
          livenessProbe:
            httpGet:
              path: /healthz/leader-election
              port: 9811
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 60
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources: 
            {}

        # liveness probe
        - name: csi-liveness-probe
          image: {{ .Values.images.livenessProbe }}
          imagePullPolicy: IfNotPresent
          args:
            - --csi-address=$(ADDRESS)
            - --http-endpoint=:9808
          env:
            - name: ADDRESS
              value: /var/lib/csi/sockets/pluginproxy/csi.sock
          ports:
            - containerPort: 9808
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9808
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 60
          volumeMounts:
            - name: socket-dir
              mountPath: /var/lib/csi/sockets/pluginproxy/
          resources: 
            {}

      volumes:
        - name: socket-dir
          emptyDir: {}
---
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: seaweedfs-csi-driver
spec:
  attachRequired: true
  podInfoOnMount: true
{{- end }}
