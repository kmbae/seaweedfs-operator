# r7615-only RDMA isolation probe.
# Use after applying deploy/sriov-rdma-exclusive-r7615-pool.yaml.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: sriov-ib-rdma-network
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/resourceName: nvidia.com/mlnxnics
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "sriov-ib-rdma-network",
      "plugins": [
        {
          "type": "ib-sriov",
          "pkey": "0x7fff",
          "link_state": "enable",
          "ibKubernetesEnabled": true,
          "ipam": {
            "type": "nv-ipam",
            "poolName": "sriov-ib-pool"
          }
        },
        {
          "type": "rdma"
        }
      ]
    }
---
apiVersion: v1
kind: Pod
metadata:
  name: rdma-vf-rdmaiso-r7615
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/networks: |
      [
        {
          "name": "sriov-ib-rdma-network",
          "namespace": "default",
          "infiniband-guid": "02:00:00:00:00:00:10:20",
          "interface": "net1",
          "cni-args": {
            "mellanox.infiniband.app": "configured",
            "pkey": ""
          }
        }
      ]
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: r7615
  containers:
    - name: rdma-probe
      image: kmbae27/rdma-engine:rdma-20260624-3cedc8c
      imagePullPolicy: IfNotPresent
      command: ["/bin/sh", "-c", "sleep 3600"]
      securityContext:
        capabilities:
          add:
            - IPC_LOCK
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
          nvidia.com/mlnxnics: "1"
        limits:
          memory: 256Mi
          nvidia.com/mlnxnics: "1"
