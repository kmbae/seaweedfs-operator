apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensm-rdma-fabric
  namespace: nvidia-network-operator
  labels:
    app: opensm-rdma-fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opensm-rdma-fabric
  template:
    metadata:
      labels:
        app: opensm-rdma-fabric
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: r7615
      containers:
        - name: opensm
          image: kmbae27/opensm:rdma-20260624-sadb
          imagePullPolicy: Always
          env:
            - name: OPENSM_PRIORITY
              value: "15"
            - name: OPENSM_SM_ASSIGNED_GUID
              value: "0x02"
            - name: OPENSM_SA_DB_FILE
              value: /etc/opensm/sa-db.txt
            - name: OPENSM_EXTRA_ARGS
              value: "-f stdout"
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev-infiniband
              mountPath: /dev/infiniband
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: guidinfo-sa-db
              mountPath: /etc/opensm/sa-db.txt
              subPath: sa-db.txt
              readOnly: true
      volumes:
        - name: dev-infiniband
          hostPath:
            path: /dev/infiniband
            type: Directory
        - name: sys
          hostPath:
            path: /sys
            type: Directory
        - name: guidinfo-sa-db
          configMap:
            name: opensm-guidinfo-sa-db
