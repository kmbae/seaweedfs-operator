{{- if and .Values.admin.enabled .Values.admin.credentialsSecret.create }}
{{- $secretName := include "seaweedfs.adminSecretName" . }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $adminUser := .Values.admin.credentialsSecret.adminUser | default "admin" }}
{{- $adminPassword := .Values.admin.credentialsSecret.adminPassword }}
{{- if not $adminPassword }}
{{- if $existingSecret }}
{{- $adminPassword = index $existingSecret.data "adminPassword" | b64dec }}
{{- else }}
{{- $adminPassword = randAlphaNum 20 }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  annotations:
    seaweed.seaweedfs.com/auto-generated: "true"
type: Opaque
stringData:
  adminUser: {{ $adminUser | quote }}
  adminPassword: {{ $adminPassword | quote }}
{{- end }}
