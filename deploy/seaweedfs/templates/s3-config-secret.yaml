{{- if and .Values.filer.s3.enabled .Values.filer.s3.configSecret.create }}
{{- $secretName := include "seaweedfs.s3SecretName" . }}
{{- $configKey := .Values.filer.s3.configSecret.key | default "s3.json" }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if not $existingSecret }}
{{- $accessKey := .Values.filer.s3.configSecret.accessKey | default (randAlphaNum 20) }}
{{- $secretKey := .Values.filer.s3.configSecret.secretKey | default (randAlphaNum 40) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: s3
  annotations:
    seaweed.seaweedfs.com/auto-generated: "true"
type: Opaque
stringData:
  accessKey: {{ $accessKey | quote }}
  secretKey: {{ $secretKey | quote }}
  {{ $configKey }}: |
    {
      "identities": [
        {
          "name": "admin",
          "credentials": [
            {
              "accessKey": {{ $accessKey | quote }},
              "secretKey": {{ $secretKey | quote }}
            }
          ],
          "actions": [
            "Admin",
            "Read",
            "List",
            "Tagging",
            "Write"
          ]
        }
      ]
    }
{{- end }}
{{- end }}
