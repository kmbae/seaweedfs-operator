# Seaweed CR name (defaults to Helm release name)
name: ""
image: kmbae27/seaweedfs:latest
volumeServerDiskCount: 1
hostSuffix: ""
labels: {}
annotations: {}

master:
  replicas: 1
  volumeSizeLimitMB: 1024
  # Use "000" for a single node; use "010" when you have two or more racks
  defaultReplication: "000"

# Add a block per node, then helm upgrade
#   helm upgrade -i -n seaweedfs seaweedfs ./seaweedfs
volumeNodes:
  r7615:
    enabled: true
    pvName: seaweedfs-volume-pv-r7615
    node: r7615          # must match NAME from kubectl get nodes
    rack: rack1
    dataCenter: dc1
    capacity: 105Ti      # PV: full /dev/sda ~109T (df Size 109T)
    pvcRequest: 105Ti    # Volume PVC request (same as capacity on a single node)
    path: /Data/seaweedfs
  # gnode2:
  #   enabled: false
  #   pvName: seaweedfs-volume-pv-gnode2
  #   node: gnode2
  #   rack: rack1
  #   dataCenter: dc1
  #   capacity: 200Gi
  #   pvcRequest: 200Gi
  #   path: /Data/seaweedfs
  # gnode3:
  #   enabled: true
  #   pvName: seaweedfs-volume-pv-gnode3
  #   node: gnode3
  #   rack: rack2
  #   dataCenter: dc1
  #   capacity: 1Ti
  #   pvcRequest: 200Gi
  #   path: /Data/seaweedfs

storageClass:
  name: seaweedfs
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer

volume:
  storageClassName: seaweedfs
  pvcRequest: 105Ti
  annotations: {}
  sidecars: []

filer:
  replicas: 1
  config: |
    [leveldb2]
    enabled = true
    dir = "/data/filerldb2"
  s3:
    enabled: false
    configSecret: {}

rdma:
  enabled: true
  registry: kmbae27
  sidecarTag: latest
  engineTag: ucx
  imagePullPolicy: Always
  multusNetwork: sriov-ib-network
  mlnxnicResource: nvidia.com/mlnxnics
  hugepages2Mi: 1Gi
  listenPort: 18515
  volumeServerURL: http://127.0.0.1:8444
