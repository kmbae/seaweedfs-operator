# Seaweed CR name (defaults to Helm release name)
name: ""
image: kmbae27/seaweedfs:rdma-embedded-20260628-e4d5cf413
volumeServerDiskCount: 1
hostSuffix: ""
labels: {}
annotations: {}

master:
  replicas: 1
  # Requires 5BytesOffset (large_disk) image; max 8000GB per volume.
  volumeSizeLimitMB: 1024000
  # Use "000" for a single node; use "010" when you have two or more racks
  defaultReplication: "000"
  metricsPort: 9327

# Add a block per node, then helm upgrade
#   helm upgrade -i -n seaweedfs seaweedfs ./seaweedfs
volumeNodes:
  r7615:
    enabled: true
    pvName: seaweedfs-volume-pv-r7615
    node: r7615          # must match NAME from kubectl get nodes
    rack: rack1
    dataCenter: dc1
    capacity: 105Ti      # PV: full /dev/sda ~109T (df Size 109T)
    pvcRequest: 105Ti    # Volume PVC request (same as capacity on a single node)
    path: /Data/seaweedfs
  # gnode2:
  #   enabled: false
  #   pvName: seaweedfs-volume-pv-gnode2
  #   node: gnode2
  #   rack: rack1
  #   dataCenter: dc1
  #   capacity: 200Gi
  #   pvcRequest: 200Gi
  #   path: /Data/seaweedfs
  # gnode3:
  #   enabled: true
  #   pvName: seaweedfs-volume-pv-gnode3
  #   node: gnode3
  #   rack: rack2
  #   dataCenter: dc1
  #   capacity: 1Ti
  #   pvcRequest: 200Gi
  #   path: /Data/seaweedfs

storageClass:
  name: seaweedfs
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer

volume:
  storageClassName: seaweedfs
  pvcRequest: 105Ti
  metricsPort: 9327
  annotations: {}
  containerSecurityContext: {}
  sidecars: []

filer:
  replicas: 1
  metricsPort: 9327
  config: |
    [leveldb2]
    enabled = true
    dir = "/data/filerldb2"
  s3:
    enabled: true
    configSecret:
      create: true
      name: ""
      key: s3.json
      # Leave empty to auto-generate on first install.
      accessKey: ""
      secretKey: ""

# SeaweedFS Admin UI (weed admin) — cluster management web UI on port 23646.
# When create: true (default), Helm auto-creates the credentials Secret on first
# install and prints the password after helm upgrade / install.sh.
# S3 API is embedded in the filer (port 8333); configSecret.create auto-generates
# access/secret keys in Secret {release}-s3-config.
admin:
  enabled: true
  credentialsSecret:
    create: true
    name: seaweedfs-admin-credentials
    adminUser: admin
    # Leave empty to auto-generate a random password on first install.
    adminPassword: ""

rdma:
  enabled: true
  # sriov: use Multus/SR-IOV VF resource.
  # hostPF: use the node's host RDMA PF for lab validation while VF LID/UFM is unresolved.
  mode: hostPF
  registry: kmbae27
  sidecarTag: swvfs-20260628-0690f0a81-static
  engineTag: rdma-20260628-f584cbeaf
  imagePullPolicy: Always
  enablePayloadRDMA: true
  enableNativeVolumeRDMA: true
  sidecars:
    # Keep existing sidecars on by default. Disable both for embedded-only
    # volume RDMA canaries once the SeaweedFS image is built with verbs support.
    engine:
      enabled: true
    http:
      enabled: true
  nativeVolume:
    enabled: true
    # Enables the in-process SeaweedFS volume server RDMA transport. Requires a
    # SeaweedFS image built with the embedded RDMA verbs implementation.
    embedded: false
    embeddedFallbackSocket: true
    socketPath: /tmp/rdma/volume-rdma-engine.sock
    provider: verbs
    hcaPort: 1
    gidIndex: 0
    fallbackMock: false
    serviceLevel: 0
    readMaxSizeMB: 16
    readLeaseTTL: 30s
    readBufferSizeMB: 4
  volumeGrpcMaxMessageBytes: "134217728"
  deviceName: mlx5_1
  ucxTls: rc_verbs,ud_verbs,tcp,self
  ucxNetDevices: ""
  multusNetwork: default/sriov-ib-network
  mlnxnicResource: nvidia.com/mlnxnics
  hugepages2Mi: 1Gi
  listenPort: 18515
  realInitRetries: 180
  realInitRetryIntervalMs: 1000
  volumeServerURL: http://127.0.0.1:8444
