apiVersion: v1
kind: Namespace
metadata:
  name: seaweed-vfs-poc
---
apiVersion: batch/v1
kind: Job
metadata:
  name: seaweed-vfs-host-install-hnode4
  namespace: seaweed-vfs-poc
  labels:
    app.kubernetes.io/name: seaweed-vfs-host-install
    app.kubernetes.io/part-of: seaweed-vfs-poc
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweed-vfs-host-install
        app.kubernetes.io/part-of: seaweed-vfs-poc
    spec:
      restartPolicy: Never
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: hnode4
      tolerations:
        - operator: Exists
      containers:
        - name: host-install
          image: ubuntu:24.04
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              chroot /host /bin/bash -lc '
                set -euo pipefail
                export DEBIAN_FRONTEND=noninteractive
                install -d -m 0755 /var/tmp/seaweed-vfs-poc
                curl -fsSL https://raw.githubusercontent.com/seaweedfs/artifactory/main/seaweed-vfs/install.sh -o /var/tmp/seaweed-vfs-poc/install.sh
                SEAWEEDFS_VFS_RELEASE=vfs-0.1.0 bash /var/tmp/seaweed-vfs-poc/install.sh
                modinfo seaweedvfs
              '
          volumeMounts:
            - name: host-root
              mountPath: /host
            - name: host-proc
              mountPath: /host/proc
            - name: host-sys
              mountPath: /host/sys
            - name: host-dev
              mountPath: /host/dev
            - name: host-run
              mountPath: /host/run
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
