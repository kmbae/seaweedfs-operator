apiVersion: v1
kind: Namespace
metadata:
  name: seaweed-vfs-poc
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: seaweed-vfs-node-workers
  namespace: seaweed-vfs-poc
  labels:
    app.kubernetes.io/name: seaweed-vfs-node-workers
    app.kubernetes.io/part-of: seaweed-vfs-poc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweed-vfs-node-workers
      app.kubernetes.io/part-of: seaweed-vfs-poc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweed-vfs-node-workers
        app.kubernetes.io/part-of: seaweed-vfs-poc
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - hnode1
                      - hnode2
                      - hnode3
      tolerations:
        - operator: Exists
      containers:
        - name: seaweed-vfs
          image: ghcr.io/seaweedfs/seaweedfs-vfs:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: FILER
              value: seaweedfs-filer.seaweedfs.svc.cluster.local:18888
            - name: MNT
              value: /var/lib/seaweedfs-vfs/mnt
            - name: UNMOUNT_ON_EXIT
              value: "1"
            - name: SEAWEED_DISABLE_ENTERPRISE_MODE
              value: "1"
            - name: HTTP_PROXY
              value: http://127.0.0.1:18083
            - name: http_proxy
              value: http://127.0.0.1:18083
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - grep -q ' /var/lib/seaweedfs-vfs/mnt ' /proc/mounts
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          volumeMounts:
            - name: host-lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: host-dev
              mountPath: /dev
            - name: host-mount
              mountPath: /var/lib/seaweedfs-vfs
              mountPropagation: Bidirectional
        - name: sw-kd-rdma-proxy
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /opt/seaweed-vfs-rdma/sw-kd-volume-rdma-proxy.py
          env:
            - name: LISTEN_HOST
              value: 127.0.0.1
            - name: LISTEN_PORT
              value: "18083"
            - name: RDMA_GATEWAY_URL
              value: http://127.0.0.1:18081
          ports:
            - name: swkd-rdma
              containerPort: 18083
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import socket; s=socket.create_connection(('127.0.0.1', 18083), 1); s.close()"
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: rdma-proxy-script
              mountPath: /opt/seaweed-vfs-rdma
              readOnly: true
      volumes:
        - name: host-lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-mount
          hostPath:
            path: /var/lib/seaweedfs-vfs
            type: DirectoryOrCreate
        - name: rdma-proxy-script
          configMap:
            name: seaweed-vfs-rdma-proxy
            defaultMode: 0755
