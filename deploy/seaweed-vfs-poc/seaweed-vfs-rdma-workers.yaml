apiVersion: v1
kind: Namespace
metadata:
  name: seaweed-vfs-poc
---
apiVersion: v1
kind: Service
metadata:
  name: seaweed-vfs-rdma-peer
  namespace: seaweed-vfs-poc
  labels:
    app.kubernetes.io/name: seaweed-vfs-rdma-peer
    app.kubernetes.io/part-of: seaweed-vfs-poc
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: seaweed-vfs-rdma-node-workers
    app.kubernetes.io/part-of: seaweed-vfs-poc
  ports:
    - name: rdma-control
      port: 18084
      targetPort: rdma-control
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: seaweed-vfs-rdma-node-workers
  namespace: seaweed-vfs-poc
  labels:
    app.kubernetes.io/name: seaweed-vfs-rdma-node-workers
    app.kubernetes.io/part-of: seaweed-vfs-poc
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweed-vfs-rdma-node-workers
      app.kubernetes.io/part-of: seaweed-vfs-poc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweed-vfs-rdma-node-workers
        app.kubernetes.io/part-of: seaweed-vfs-poc
    spec:
      hostNetwork: true
      hostPID: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - hnode1
                      - hnode2
                      - hnode3
      tolerations:
        - operator: Exists
      containers:
        - name: swvfs-rdma-daemon
          image: kmbae27/rdma-sidecar:swvfs-20260628-writebatch-142924c09
          imagePullPolicy: Always
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RESOURCE
                - IPC_LOCK
          command:
            - /bin/sh
            - -lc
          args:
            - |
              set -eu
              MNT="${MNT:-/var/lib/seaweedfs-vfs/mnt}"
              DAEMON=""

              term() {
                if [ "${UNMOUNT_ON_EXIT:-1}" = "1" ]; then
                  echo "unmounting ${MNT}"
                  umount "${MNT}" 2>/dev/null || umount -l "${MNT}" 2>/dev/null || true
                fi
                if [ -n "${DAEMON}" ]; then
                  kill "${DAEMON}" 2>/dev/null || true
                fi
                exit 0
              }
              trap term TERM INT

              if grep -q " ${MNT} " /proc/mounts; then
                echo "removing stale SeaweedVFS mount at ${MNT}"
                umount "${MNT}" 2>/dev/null || umount -l "${MNT}" 2>/dev/null || {
                  echo "ERROR: failed to unmount stale SeaweedVFS mount at ${MNT}" >&2
                  exit 1
                }
              fi
              if lsmod | grep -q '^seaweedvfs '; then
                fresh_module=true
                expected_io_max="${KERNEL_RDMA_IO_MAX:-16777216}"
                expected_send_window="${KERNEL_RDMA_SEND_WINDOW:-16}"
                expected_srcversion="${KERNEL_MODULE_SRCVERSION:-}"
                for param in kernel_rdma_io_max kernel_rdma_send_window kernel_rdma_send_batches kernel_rdma_send_batch_wrs kernel_rdma_send_max_batch_wrs rdma_read_window_ios rdma_write_window_ios kernel_rdma_connection_slots kernel_rdma_connection_slot_misses kernel_rdma_direct_reads kernel_rdma_direct_read_min_bytes kernel_rdma_direct_read_ops kernel_rdma_direct_read_bytes kernel_rdma_direct_read_fallbacks kernel_rdma_direct_read_errors kernel_rdma_read_prepare_batch_ops kernel_rdma_read_prepare_batch_descs kernel_rdma_read_prepare_batch_fallbacks kernel_rdma_direct_writes kernel_rdma_direct_write_min_bytes kernel_rdma_defer_write_commits kernel_rdma_async_writeback kernel_rdma_pagecache_writeback kernel_rdma_async_writeback_max_bytes kernel_rdma_direct_write_ops kernel_rdma_direct_write_bytes kernel_rdma_direct_write_fallbacks kernel_rdma_direct_write_errors kernel_rdma_write_prepare_batch_ops kernel_rdma_write_prepare_batch_descs kernel_rdma_write_prepare_batch_fallbacks kernel_read_rdma_folio_direct_ops kernel_read_rdma_folio_direct_bytes kernel_write_rdma_direct_iter_bytes kernel_write_rdma_bounce_copy_bytes kernel_write_rdma_deferred_queued kernel_write_rdma_deferred_flushed kernel_write_rdma_deferred_flushes kernel_write_rdma_deferred_errors kernel_write_rdma_commit_batch_ops kernel_write_rdma_commit_batch_entries kernel_write_rdma_commit_batch_errors kernel_write_rdma_async_queued kernel_write_rdma_async_flushed kernel_write_rdma_async_flushes kernel_write_rdma_async_errors kernel_write_rdma_async_bytes kernel_write_rdma_async_backpressure kernel_write_rdma_pagecache_write_ops kernel_write_rdma_pagecache_write_bytes kernel_write_rdma_pagecache_dirty_folios kernel_write_rdma_pagecache_writepages_ops kernel_write_rdma_pagecache_writeback_ops kernel_write_rdma_pagecache_writeback_bytes kernel_write_rdma_pagecache_writeback_fallbacks kernel_write_rdma_pagecache_writeback_errors; do
                  [ -e "/sys/module/seaweedvfs/parameters/${param}" ] || fresh_module=false
                done
                loaded_srcversion="$(cat /sys/module/seaweedvfs/srcversion 2>/dev/null || true)"
                if [ -n "${expected_srcversion}" ] && [ "${loaded_srcversion}" != "${expected_srcversion}" ]; then
                  echo "loaded seaweedvfs srcversion=${loaded_srcversion:-missing}; want ${expected_srcversion}"
                  fresh_module=false
                fi
                io_max="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_io_max 2>/dev/null || true)"
                send_window="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_send_window 2>/dev/null || true)"
                direct_reads="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_direct_reads 2>/dev/null || true)"
                direct_writes="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_direct_writes 2>/dev/null || true)"
                defer_write_commits="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_defer_write_commits 2>/dev/null || true)"
                async_writeback="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_async_writeback 2>/dev/null || true)"
                pagecache_writeback="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_pagecache_writeback 2>/dev/null || true)"
                expected_async_max="${KERNEL_RDMA_ASYNC_WRITEBACK_MAX_BYTES:-268435456}"
                async_max="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_async_writeback_max_bytes 2>/dev/null || true)"
                [ "${io_max}" = "${expected_io_max}" ] || fresh_module=false
                [ "${send_window}" = "${expected_send_window}" ] || fresh_module=false
                [ "${async_max}" = "${expected_async_max}" ] || fresh_module=false
                case "${direct_reads}" in
                  Y|y|1|true|TRUE) ;;
                  *) fresh_module=false ;;
                esac
                case "${direct_writes}" in
                  Y|y|1|true|TRUE) ;;
                  *) fresh_module=false ;;
                esac
                case "${defer_write_commits}" in
                  Y|y|1|true|TRUE) ;;
                  *) fresh_module=false ;;
                esac
                case "${async_writeback}" in
                  Y|y|1|true|TRUE) ;;
                  *) fresh_module=false ;;
                esac
                case "${pagecache_writeback}" in
                  Y|y|1|true|TRUE) ;;
                  *) fresh_module=false ;;
                esac
                if [ "${fresh_module}" = "true" ]; then
                  echo "reusing already loaded fresh seaweedvfs module"
                else
                  modprobe -r seaweedvfs || {
                    echo "ERROR: failed to unload stale seaweedvfs module; a stale mount or process is still using it" >&2
                    exit 1
                  }
                fi
              fi
              if ! lsmod | grep -q '^seaweedvfs '; then
                modprobe seaweedvfs kernel_rdma=1 kernel_rdma_send_window="${KERNEL_RDMA_SEND_WINDOW:-16}" kernel_rdma_direct_reads="${KERNEL_RDMA_DIRECT_READS:-1}" kernel_rdma_direct_read_min_bytes="${KERNEL_RDMA_DIRECT_READ_MIN_BYTES:-262144}" kernel_rdma_direct_writes="${KERNEL_RDMA_DIRECT_WRITES:-1}" kernel_rdma_direct_write_min_bytes="${KERNEL_RDMA_DIRECT_WRITE_MIN_BYTES:-262144}" kernel_rdma_defer_write_commits="${KERNEL_RDMA_DEFER_WRITE_COMMITS:-1}" kernel_rdma_async_writeback="${KERNEL_RDMA_ASYNC_WRITEBACK:-1}" kernel_rdma_pagecache_writeback="${KERNEL_RDMA_PAGECACHE_WRITEBACK:-1}" kernel_rdma_async_writeback_max_bytes="${KERNEL_RDMA_ASYNC_WRITEBACK_MAX_BYTES:-268435456}" rdma_read_hints="${RDMA_READ_HINTS:-0}" rdma_write_hints="${RDMA_WRITE_HINTS:-0}" rdma_read_window_ios="${RDMA_READ_WINDOW_IOS:-4}" rdma_write_window_ios="${RDMA_WRITE_WINDOW_IOS:-4}"
              fi
              for param in kernel_rdma kernel_rdma_direct_reads kernel_rdma_direct_writes kernel_rdma_defer_write_commits kernel_rdma_async_writeback kernel_rdma_pagecache_writeback; do
                value="$(cat "/sys/module/seaweedvfs/parameters/${param}" 2>/dev/null || true)"
                case "${value}" in
                  Y|y|1|true|TRUE)
                    echo "seaweedvfs ${param}=${value}"
                    ;;
                  *)
                    echo "ERROR: seaweedvfs ${param} is not enabled; got '${value}'" >&2
                    exit 1
                    ;;
                esac
              done
              expected_io_max="${KERNEL_RDMA_IO_MAX:-16777216}"
              actual_io_max="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_io_max 2>/dev/null || true)"
              if [ "${actual_io_max}" != "${expected_io_max}" ]; then
                echo "ERROR: seaweedvfs kernel_rdma_io_max=${actual_io_max:-missing}; want ${expected_io_max}" >&2
                exit 1
              fi
              echo "seaweedvfs kernel_rdma_io_max=${actual_io_max}"
              expected_send_window="${KERNEL_RDMA_SEND_WINDOW:-16}"
              actual_send_window="$(cat /sys/module/seaweedvfs/parameters/kernel_rdma_send_window 2>/dev/null || true)"
              if [ "${actual_send_window}" != "${expected_send_window}" ]; then
                echo "ERROR: seaweedvfs kernel_rdma_send_window=${actual_send_window:-missing}; want ${expected_send_window}" >&2
                exit 1
              fi
              echo "seaweedvfs kernel_rdma_send_window=${actual_send_window}"
              expected_srcversion="${KERNEL_MODULE_SRCVERSION:-}"
              actual_srcversion="$(cat /sys/module/seaweedvfs/srcversion 2>/dev/null || true)"
              if [ -n "${expected_srcversion}" ] && [ "${actual_srcversion}" != "${expected_srcversion}" ]; then
                echo "ERROR: seaweedvfs srcversion=${actual_srcversion:-missing}; want ${expected_srcversion}" >&2
                exit 1
              fi
              [ -z "${expected_srcversion}" ] || echo "seaweedvfs srcversion=${actual_srcversion}"
              for param in kernel_rdma_io_max kernel_rdma_send_window kernel_rdma_send_batches kernel_rdma_send_batch_wrs kernel_rdma_send_max_batch_wrs rdma_read_window_ios rdma_write_window_ios kernel_rdma_connection_slots kernel_rdma_connection_slot_misses kernel_rdma_direct_read_min_bytes kernel_rdma_direct_read_ops kernel_rdma_direct_read_bytes kernel_rdma_direct_read_fallbacks kernel_rdma_direct_read_errors kernel_rdma_read_prepare_batch_ops kernel_rdma_read_prepare_batch_descs kernel_rdma_read_prepare_batch_fallbacks kernel_rdma_direct_write_min_bytes kernel_rdma_defer_write_commits kernel_rdma_async_writeback kernel_rdma_pagecache_writeback kernel_rdma_async_writeback_max_bytes kernel_rdma_direct_write_ops kernel_rdma_direct_write_bytes kernel_rdma_direct_write_fallbacks kernel_rdma_direct_write_errors kernel_rdma_write_prepare_batch_ops kernel_rdma_write_prepare_batch_descs kernel_rdma_write_prepare_batch_fallbacks kernel_read_rdma_folio_direct_ops kernel_read_rdma_folio_direct_bytes kernel_write_rdma_direct_iter_bytes kernel_write_rdma_bounce_copy_bytes kernel_write_rdma_deferred_queued kernel_write_rdma_deferred_flushed kernel_write_rdma_deferred_flushes kernel_write_rdma_deferred_errors kernel_write_rdma_commit_batch_ops kernel_write_rdma_commit_batch_entries kernel_write_rdma_commit_batch_errors kernel_write_rdma_async_queued kernel_write_rdma_async_flushed kernel_write_rdma_async_flushes kernel_write_rdma_async_errors kernel_write_rdma_async_bytes kernel_write_rdma_async_backpressure kernel_write_rdma_pagecache_write_ops kernel_write_rdma_pagecache_write_bytes kernel_write_rdma_pagecache_dirty_folios kernel_write_rdma_pagecache_writepages_ops kernel_write_rdma_pagecache_writeback_ops kernel_write_rdma_pagecache_writeback_bytes kernel_write_rdma_pagecache_writeback_fallbacks kernel_write_rdma_pagecache_writeback_errors; do
                [ -e "/sys/module/seaweedvfs/parameters/${param}" ] || {
                  echo "ERROR: seaweedvfs parameter ${param} is missing; stale kernel module is loaded" >&2
                  exit 1
                }
              done
              i=0
              while [ ! -e /dev/seaweedvfs ] && [ "${i}" -lt 100 ]; do
                i=$((i + 1))
                sleep 0.1
              done
              [ -e /dev/seaweedvfs ] || {
                echo "ERROR: /dev/seaweedvfs is not available" >&2
                exit 1
              }

              /app/swvfs-rdma-daemon \
                --dev=/dev/seaweedvfs \
                --filer=seaweedfs-filer.seaweedfs.svc.cluster.local:8888 \
                --engine-socket=/tmp/rdma/rdma-engine.sock \
                --enable-read-rdma="${ENABLE_READ_RDMA:-false}" \
                --enable-write-rdma="${ENABLE_WRITE_RDMA:-false}" \
                --enable-payload-rdma="${ENABLE_PAYLOAD_RDMA:-false}" \
                --enable-volume-native-rdma="${ENABLE_VOLUME_NATIVE_RDMA:-true}" \
                --rdma-read-min-size="${RDMA_READ_MIN_SIZE:-262144}" \
                --rdma-write-min-size="${RDMA_WRITE_MIN_SIZE:-262144}" \
                --rdma-control-listen="${RDMA_CONTROL_LISTEN:-:18084}" \
                --rdma-peer-endpoints="${RDMA_PEER_ENDPOINTS-}" \
                --rdma-peer-min-count="${RDMA_PEER_MIN_COUNT:-3}" \
                --rdma-peer-connect-interval="${RDMA_PEER_CONNECT_INTERVAL:-5s}" \
                --rdma-peer-connect-timeout="${RDMA_PEER_CONNECT_TIMEOUT:-5s}" \
                --rdma-peer-service-level="${RDMA_PEER_SERVICE_LEVEL:-0}" \
                --fallback-on-error=true \
                --timeout=300s \
                --max-connections=8 \
                --debug &
              DAEMON=$!

              i=0
              while ! fuser /dev/seaweedvfs >/dev/null 2>&1 && [ "${i}" -lt 100 ]; do
                kill -0 "${DAEMON}" 2>/dev/null || {
                  echo "swvfs-rdma-daemon exited before attaching to /dev/seaweedvfs" >&2
                  exit 1
                }
                i=$((i + 1))
                sleep 0.1
              done

              mkdir -p "${MNT}"
              if grep -q " ${MNT} " /proc/mounts; then
                echo "already mounted at ${MNT}; attached RDMA daemon"
              else
                mount -t seaweedvfs none "${MNT}"
                echo "mounted SeaweedFS RDMA VFS at ${MNT}"
              fi

              wait "${DAEMON}"
          env:
            - name: MNT
              value: /var/lib/seaweedfs-vfs/mnt
            - name: UNMOUNT_ON_EXIT
              value: "1"
            - name: ENABLE_READ_RDMA
              value: "true"
            - name: ENABLE_WRITE_RDMA
              value: "true"
            - name: ENABLE_PAYLOAD_RDMA
              value: "true"
            - name: ENABLE_VOLUME_NATIVE_RDMA
              value: "true"
            - name: RDMA_READ_MIN_SIZE
              value: "262144"
            - name: RDMA_WRITE_MIN_SIZE
              value: "262144"
            - name: RDMA_READ_WINDOW_IOS
              value: "4"
            - name: RDMA_WRITE_WINDOW_IOS
              value: "4"
            - name: KERNEL_RDMA_SEND_WINDOW
              value: "16"
            - name: KERNEL_RDMA_DIRECT_READS
              value: "1"
            - name: KERNEL_RDMA_DIRECT_READ_MIN_BYTES
              value: "262144"
            - name: KERNEL_RDMA_DIRECT_WRITES
              value: "1"
            - name: KERNEL_RDMA_DIRECT_WRITE_MIN_BYTES
              value: "262144"
            - name: KERNEL_RDMA_PAGECACHE_WRITEBACK
              value: "1"
            - name: KERNEL_MODULE_SRCVERSION
              value: BFE38021DBC9EF5610550D1
            - name: RDMA_READ_HINTS
              value: "0"
            - name: RDMA_WRITE_HINTS
              value: "0"
            - name: RDMA_CONTROL_LISTEN
              value: :18084
            - name: RDMA_PEER_ENDPOINTS
              value: ""
            - name: RDMA_PEER_MIN_COUNT
              value: "0"
            - name: RDMA_PEER_CONNECT_INTERVAL
              value: 5s
            - name: RDMA_PEER_CONNECT_TIMEOUT
              value: 5s
            - name: RDMA_PEER_SERVICE_LEVEL
              value: "0"
            - name: SWVFS_RDMA_MR_POOL_MAX_IDLE
              value: "64"
            - name: SWVFS_RDMA_MR_POOL_MAX_BYTES
              value: "67108864"
            - name: SWVFS_RDMA_MR_POOL_MIN_BYTES
              value: "262144"
          ports:
            - name: rdma-control
              containerPort: 18084
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - grep -q ' /var/lib/seaweedfs-vfs/mnt ' /proc/mounts
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          volumeMounts:
            - name: host-lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: host-dev
              mountPath: /dev
            - name: host-mount
              mountPath: /var/lib/seaweedfs-vfs
              mountPropagation: Bidirectional
            - name: rdma-socket
              mountPath: /tmp/rdma
        - name: rdma-engine
          image: kmbae27/rdma-engine:rdma-20260628-f584cbeaf
          imagePullPolicy: Always
          command:
            - ./rdma-engine-server
            - --debug
            - --ipc-socket
            - /tmp/rdma/rdma-engine.sock
            - --port
            - "38515"
            - --real-init-retries
            - "180"
            - --real-init-retry-interval-ms
            - "1000"
          env:
            - name: UCX_TLS
              value: rc_verbs,ud_verbs,tcp,self
            - name: RDMA_LISTEN_PORT
              value: "38515"
            - name: RDMA_ENGINE_METRICS_ADDR
              value: "0.0.0.0:18085"
          ports:
            - name: rdma-engine
              containerPort: 38515
              protocol: TCP
            - name: rdma-metrics
              containerPort: 18085
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              add:
                - IPC_LOCK
                - NET_ADMIN
                - SYS_ADMIN
                - SYS_RESOURCE
          volumeMounts:
            - name: rdma-socket
              mountPath: /tmp/rdma
            - name: host-dev
              mountPath: /dev
      volumes:
        - name: host-lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
        - name: host-mount
          hostPath:
            path: /var/lib/seaweedfs-vfs
            type: DirectoryOrCreate
        - name: rdma-socket
          emptyDir: {}
