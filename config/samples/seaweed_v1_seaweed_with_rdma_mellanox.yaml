# SeaweedFS cluster with RDMA sidecar on Mellanox SR-IOV InfiniBand (NVIDIA Network Operator).
#
# Images: YOUR_REGISTRY/seaweedfs/
apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: seaweed-rdma
  namespace: seaweedfs-operator
spec:
  image: chrislusf/seaweedfs:latest
  volumeServerDiskCount: 1
  master:
    replicas: 1
    volumeSizeLimitMB: 1024
  volume:
    replicas: 1
    requests:
      storage: 10Gi
    rack: rack1
    dataCenter: dc1
    annotations:
      k8s.v1.cni.cncf.io/networks: sriov-ib-network
    volumes:
      - name: rdma-socket
        emptyDir: {}
    volumeMounts:
      - name: rdma-socket
        mountPath: /tmp/rdma
    sidecars:
      - name: rdma-engine
        image: registry-aisi.duckdns.org/seaweedfs/rdma-engine:ucx
        imagePullPolicy: Always
        command:
          - ./rdma-engine-server
          - --debug
          - --ipc-socket
          - /tmp/rdma/rdma-engine.sock
          - --port
          - "18515"
        env:
          - name: VOLUME_SERVER_URL
            value: "http://127.0.0.1:8444"
          - name: RDMA_LISTEN_PORT
            value: "18515"
        securityContext:
          capabilities:
            add: ["IPC_LOCK"]
        resources:
          limits:
            nvidia.com/mlnxnics: "1"
            hugepages-2Mi: 1Gi
          requests:
            nvidia.com/mlxnics: "1"
            hugepages-2Mi: 1Gi
        volumeMounts:
          - name: rdma-socket
            mountPath: /tmp/rdma
        ports:
          - name: rdma-net
            containerPort: 18515
      - name: rdma-sidecar
        image: registry-aisi.duckdns.org/seaweedfs/rdma-sidecar:latest
        imagePullPolicy: Always
        args:
          - --port=8081
          - --engine-socket=/tmp/rdma/rdma-engine.sock
          - --volume-server=http://127.0.0.1:8444
          - --volume-data-dir=/data0
          - --enable-rdma=true
        ports:
          - name: rdma-http
            containerPort: 8081
        volumeMounts:
          - name: rdma-socket
            mountPath: /tmp/rdma
          - name: mount0
            mountPath: /data0
            readOnly: true
  filer:
    replicas: 1
    config: |
      [leveldb2]
      enabled = true
      dir = "/data/filerldb2"
